<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫娘站 - 芙兰朵路专区</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Comic Sans MS", "Microsoft YaHei", Arial, sans-serif;
        }

        /* 背景设置（调整为芙兰朵路主题色：深红色系，匹配角色风格） */
        body {
            background-image: url("flan-bg.png"); /* 建议替换为芙兰朵路相关背景图 */
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            padding-top: 100px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,230,235,0.9), rgba(255,180,195,0.85));
            z-index: -1;
        }

        /* 悬浮爪印装饰 */
        .paw-decor {
            position: fixed;
            color: rgba(220,50,100,0.15); /* 调整为深红色系爪印 */
            font-size: 60px;
            z-index: -1;
            animation: pawFloat 15s linear infinite;
        }
        .paw1 { top: 15%; left: 10%; animation-delay: 0s; }
        .paw2 { top: 60%; left: 85%; animation-delay: 3s; }
        .paw3 { top: 30%; left: 75%; animation-delay: 6s; }
        .paw4 { top: 80%; left: 20%; animation-delay: 9s; }
        @keyframes pawFloat {
            0% { transform: translate(0,0) rotate(0deg); opacity: 0.15; }
            25% { transform: translate(20px,-15px) rotate(10deg); opacity: 0.2; }
            50% { transform: translate(0,30px) rotate(0deg); opacity: 0.15; }
            75% { transform: translate(-20px,-15px) rotate(-10deg); opacity: 0.2; }
            100% { transform: translate(0,0) rotate(0deg); opacity: 0.15; }
        }

        /* 顶部导航栏（调整为芙兰朵路主题色：深红色） */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(220,50,100,0.3);
            z-index: 100;
            background: linear-gradient(90deg, #ff6b8e, #ff8fa8, #ff6b8e);
            transition: all 0.5s ease;
        }
        .header.scroll {
            padding: 15px 20px;
            background: linear-gradient(90deg, #ff476f, #ff6b8e, #ff476f);
            box-shadow: 0 6px 25px rgba(220,30,80,0.4);
        }
        /* 优化：返回主页链接（添加猫耳图标，匹配主页面风格） */
        .back-link {
            position: absolute;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 18px;
            display: flex;
            align-items: center;
            transition: transform 0.3s ease, color 0.3s ease;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
        .back-link:hover {
            transform: translateX(-5px);
            color: #ffe6ef; /*  hover时颜色变浅 */
        }
        .back-link i {
            margin-right: 8px;
            font-size: 20px;
        }
        .cat-ear {
            font-size: 28px;
            color: white;
            margin: 0 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .header h1 {
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            letter-spacing: 2px;
            background: linear-gradient(white, #ffe6ef);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto 50px;
            padding: 40px 20px;
            background-color: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(220,50,100,0.2);
        }

        /* 页面标题（调整为芙兰朵路主题色） */
        .page-title {
            color: #ff476f;
            font-size: 26px;
            margin-bottom: 30px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 3px dashed #ff8fa8;
        }
        .page-title .fa-heart {
            color: #ff6b8e;
            margin: 0 15px;
            animation: heartBeat 1.5s ease infinite;
        }
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #ff476f; }
            100% { transform: scale(1); }
        }

        /* 图片网格布局 */
        .image-grid {
            display: grid;
            gap: 20px;
            margin-bottom: 30px;
        }
        @media (min-width: 320px) {
            .image-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 768px) {
            .image-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 1024px) {
            .image-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (min-width: 1200px) {
            .image-grid { grid-template-columns: repeat(6, 1fr); }
        }

        /* 图片卡片（调整边框颜色为深红色系） */
        .image-item {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(220,50,100,0.15);
            position: relative;
            transition: all 0.4s ease;
            border: 3px solid transparent;
            background-clip: padding-box, border-box;
            background-origin: padding-box, border-box;
            background-image: linear-gradient(white, white), 
                              linear-gradient(135deg, #ff8fa8, #ffb6c1, #ff8fa8);
            aspect-ratio: 3/4;
        }
        .image-item:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 10px 25px rgba(220,30,80,0.3);
            z-index: 10;
            background-image: linear-gradient(white, white), 
                              linear-gradient(135deg, #ff476f, #ff6b8e, #ff476f);
        }
        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            animation: imgFadeIn 0.6s ease forwards;
        }
        @keyframes imgFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .image-num {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(255,255,255,0.9);
            color: #ff476f;
            font-size: 14px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(220,50,100,0.2);
            z-index: 10;
        }

        /* 加载提示 */
        .loading {
            text-align: center;
            padding: 50px 0;
            color: #ff6b8e;
            font-size: 20px;
        }
        .loading i {
            animation: spin 1.5s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 页脚（调整颜色为深红色系） */
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #ff6b8e;
            font-size: 16px;
            background-color: rgba(255,255,255,0.9);
            border-top: 2px dashed #ff8fa8;
        }
        .footer .icons {
            margin-bottom: 15px;
        }
        .footer .icons i {
            font-size: 22px;
            margin: 0 10px;
            color: #ff8fa8;
            transition: all 0.3s ease;
        }
        .footer .icons i:hover {
            transform: rotate(15deg) scale(1.2);
            color: #ff476f;
        }

        /* 滚动动画 */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .fade-in.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- 悬浮爪印装饰 -->
    <div class="paw-decor paw1"><i class="fa fa-paw"></i></div>
    <div class="paw-decor paw2"><i class="fa fa-paw"></i></div>
    <div class="paw-decor paw3"><i class="fa fa-paw"></i></div>
    <div class="paw-decor paw4"><i class="fa fa-paw"></i></div>

    <!-- 顶部导航栏（优化返回主页入口：添加猫耳图标） -->
    <header class="header">
        <a href="index.html" class="back-link">
            <i class="fa fa-ears"></i> 返回主页
        </a>
        <div class="cat-ear"><i class="fa fa-ears"></i></div>
        <h1>芙兰朵路专区</h1>
        <div class="cat-ear"><i class="fa fa-ears"></i></div>
    </header>

    <!-- 主内容区 -->
    <main class="container fade-in">
        <h2 class="page-title">
            <i class="fa fa-heart"></i>
            芙兰朵路精选图 (1-108)
            <i class="fa fa-heart"></i>
        </h2>
        
        <!-- 图片加载提示 -->
        <div class="loading" id="loadingIndicator">
            <i class="fa fa-spinner"></i> 正在加载芙兰朵路图片，请稍候...
        </div>
        
        <!-- 图片网格容器 -->
        <div class="image-grid" id="imageContainer"></div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="icons">
            <i class="fa fa-paw"></i>
            <i class="fa fa-heart"></i>
            <i class="fa fa-ears"></i>
            <i class="fa fa-heart"></i>
            <i class="fa fa-paw"></i>
        </div>
        <p id="copyright">© 2025 - <span id="currentYear">2025</span> 猫娘站 - 芙兰朵路专区 | 萌系治愈 · 角色专属</p>
    </footer>

    <!-- 脚本 -->
    <script>
        // 自动更新版权年份
        document.addEventListener('DOMContentLoaded', function() {
            const currentYearElement = document.getElementById('currentYear');
            const currentYear = new Date().getFullYear();
            currentYearElement.textContent = currentYear;

            // 动态生成芙兰朵路图片元素
            const imageContainer = document.getElementById('imageContainer');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const totalImages = 108;
            let loadedCount = 0;
            
            // 循环生成1-108张图片，路径已修正为sub文件夹
            for (let i = 1; i <= totalImages; i++) {
                const imageItem = document.createElement('div');
                imageItem.className = 'image-item fade-in';
                imageItem.style.animationDelay = `${(i % 20) * 0.05}s`;
                
                const numLabel = document.createElement('div');
                numLabel.className = 'image-num';
                numLabel.textContent = `No.${i}`;
                imageItem.appendChild(numLabel);
                
                const img = document.createElement('img');
                img.src = `sub/${i}.jpg`; // 已修正为sub文件夹路径
                img.alt = `芙兰朵路精选图 ${i}`;
                img.onload = function() {
                    loadedCount++;
                    if (loadedCount === totalImages) {
                        loadingIndicator.style.display = 'none';
                        window.dispatchEvent(new Event('scroll'));
                    }
                };
                img.onerror = function() {
                    img.src = `https://picsum.photos/300/400?random=${i}`; // 加载失败时显示占位图
                    loadedCount++;
                    if (loadedCount === totalImages) {
                        loadingIndicator.style.display = 'none';
                    }
                };
                
                imageItem.appendChild(img);
                imageContainer.appendChild(imageItem);
            }
        });

        // 导航栏滚动效果
        window.addEventListener('scroll', function() {
            const header = document.querySelector('.header');
            if (window.scrollY > 50) {
                header.classList.add('scroll');
            } else {
                header.classList.remove('scroll');
            }

            // 滚动时图片渐入效果
            const fadeElements = document.querySelectorAll('.fade-in');
            fadeElements.forEach(element => {
                const elementTop = element.getBoundingClientRect().top;
                const windowHeight = window.innerHeight;
                if (elementTop < windowHeight * 0.9) {
                    element.classList.add('active');
                }
            });
        });

        // 页面加载时触发一次滚动事件
        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
